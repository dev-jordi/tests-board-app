<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Software Tests</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <!-- Container principal da página -->
    <div class="container">

        <!-- Cabeçalho com título do app -->
        <header>
            <h1>🧪 SOFTWARE TESTS</h1>
            <p>Faça login para acessar o board</p>
        </header>

        <!-- Formulário de login -->
        <form id="form-login">
            <div class="campo">
                <label for="email">E-mail</label>
                <input type="email" id="email" placeholder="seu@email.com" required>
            </div>

            <div class="campo">
                <label for="senha">Senha</label>
                <input type="password" id="senha" placeholder="Sua senha" required>
            </div>

            <!-- Mensagem de erro (escondida por padrão) -->
            <p id="erro" class="erro escondido">E-mail ou senha incorretos.</p>

            <button type="submit" class="btn-entrar">Entrar</button>
        </form>

        <!-- Link para cadastro -->
        <p class="link-cadastro">Não tem conta? <a href="cadastro.html">Cadastre-se</a></p>

    </div>

    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="login.js"></script>
</body>
</html>
