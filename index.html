<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Software Tests — QA Board</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <!-- Sidebar -->
        <nav class="sidebar">
            <div class="sidebar-header">
                <h1>🧪 QA Board</h1>
            </div>
            <ul class="sidebar-menu">
                <li><a href="#" class="menu-item active" data-page="dashboard">📊 Dashboard</a></li>
                <li><a href="#" class="menu-item" data-page="tests">🧪 Testes</a></li>
                <li><a href="#" class="menu-item" data-page="bugs">🐛 Bugs</a></li>
                <li><a href="#" class="menu-item" data-page="improvements">💡 Melhorias</a></li>
            </ul>
            <div class="sidebar-footer">
                <button id="btn-theme" class="btn-theme">🌙 Dark Mode</button>
                <button id="btn-logout" class="btn-logout">Sair</button>
            </div>
        </nav>

        <!-- Main content -->
        <main class="main">
            <!-- Dashboard -->
            <section id="page-dashboard" class="page">
                <div class="page-header">
                    <h2>Dashboard</h2>
                    <p>Visão geral dos testes e qualidade</p>
                </div>
                <div class="stats-grid" id="stats-grid"></div>
                <div class="dashboard-panels">
                    <div class="panel">
                        <div class="panel-header">
                            <h3>📈 Resumo por Status</h3>
                        </div>
                        <div id="resumo-status"></div>
                    </div>
                    <div class="panel">
                        <div class="panel-header">
                            <h3>🕐 Itens Recentes</h3>
                        </div>
                        <div id="itens-recentes"></div>
                    </div>
                </div>
            </section>

            <!-- Board pages -->
            <section id="page-tests" class="page escondido">
                <div class="page-header">
                    <h2>🧪 Testes</h2>
                </div>
                <div class="board" id="board-tests"></div>
            </section>

            <section id="page-bugs" class="page escondido">
                <div class="page-header">
                    <h2>🐛 Bugs</h2>
                </div>
                <div class="board" id="board-bugs"></div>
            </section>

            <section id="page-improvements" class="page escondido">
                <div class="page-header">
                    <h2>💡 Melhorias</h2>
                </div>
                <div class="board" id="board-improvements"></div>
            </section>
        </main>
    </div>

    <!-- Confirm dialog -->
    <div id="confirm-dialog" class="dialog-overlay escondido">
        <div class="dialog">
            <h3>Excluir item?</h3>
            <p>Esta ação não pode ser desfeita.</p>
            <div class="dialog-buttons">
                <button id="confirm-cancel" class="btn-cancel">Cancelar</button>
                <button id="confirm-ok" class="btn-delete">Excluir</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js"></script>
</body>
</html>
