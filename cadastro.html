<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro — Software Tests</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <!-- Container principal -->
    <div class="container">

        <!-- Cabeçalho -->
        <header>
            <h1>🧪 SOFTWARE TESTS</h1>
            <p>Crie sua conta para acessar o board</p>
        </header>

        <!-- Formulário de cadastro -->
        <form id="form-cadastro">
            <div class="campo">
                <label for="email">E-mail</label>
                <input type="email" id="email" placeholder="seu@email.com" required>
            </div>

            <div class="campo">
                <label for="senha">Senha</label>
                <input type="password" id="senha" placeholder="Mínimo 6 caracteres" required>
            </div>

            <div class="campo">
                <label for="confirmar">Confirmar senha</label>
                <input type="password" id="confirmar" placeholder="Repita a senha" required>
            </div>

            <!-- Mensagem de erro/sucesso -->
            <p id="erro" class="erro escondido"></p>
            <p id="sucesso" class="sucesso escondido"></p>

            <button type="submit" class="btn-entrar">Cadastrar</button>
        </form>

        <!-- Link para login -->
        <p class="link-cadastro">Já tem conta? <a href="login.html">Entrar</a></p>

    </div>

    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="cadastro.js"></script>
</body>
</html>
